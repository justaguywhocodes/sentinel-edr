# Detection: Suspicious RWX memory allocation (remote)
# ATT&CK: T1055 - Process Injection
# Detects NtAllocateVirtualMemory with PAGE_EXECUTE_READWRITE (0x40)
# targeting a *different* process (targetPid > 0).
#
# Self-allocations (targetPid == 0) are routine for .NET JIT, browsers,
# and other legitimate runtimes, so we exclude them to avoid false
# positives.

name: Suspicious RWX allocation
source: HookDll
severity: high
action: LOG
conditions:
  - field: payload.function
    op: equals
    value: NtAllocateVirtualMemory
  - field: payload.protection
    op: equals
    value: "0x40"
  - field: payload.targetPid
    op: greater_than
    value: "0"
